name: Build and Upload Conda Packages

on:
  push:
    branches:
      - master
      - dev
      - 'feature/build*'
      - 'build/*'
      - pixi-dev
  workflow_dispatch:
  pull_request:
    branches:
      - master

# trusted publishing permissions
permissions:
  contents: read
  id-token: write

env:
  BUILD_NUM: 3

jobs:
  build-antspy:
    name: Build package
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: [3.14, 3.13, 3.12]
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15]
        include:
          - os: ubuntu-latest
            target-platform: linux-64
            build-args: --target-platform linux-64
          - os: ubuntu-24.04-arm
            target-platform: linux-aarch64
            build-args: --target-platform linux-aarch64
          - os: macos-15
            target-platform: osx-arm64
            build-args: --target-platform osx-arm64

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          auth-host: prefix.dev
          auth-token: ${{ secrets.PREFIX_API_KEY }}
          environments: build-ants

      - name: Add .pixi/envs/default/bin to the $PATH
        shell: bash
        run: |
          echo "$(pwd)/.pixi/envs/build-ants/bin" >> $GITHUB_PATH

      - name: Build ANTSPy
        shell: bash
        run: |
          rattler-build build \
            --continue-on-failure \
            --skip-existing local \
            --recipe ./recipes/antspyx/ \
            --variant python=${{ matrix.python }} \
            --build-num ${{ env.BUILD_NUM }} \
            ${{ matrix.build-args }}  \
            --package-format conda:22

      - name: Upload package
        shell: bash
        # do not upload on PR
        if: github.event_name == 'push'
        run: |
          for pkg in output/**/*.conda; do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c noel-forge "${pkg}" --skip-existing || true
          done


  build-antspynet:
    name: Build ANTSPyNet
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          auth-host: prefix.dev
          auth-token: ${{ secrets.PREFIX_API_KEY }}
          environments: build-ants

      - name: Add .pixi/envs/default/bin to the $PATH
        shell: bash
        run: |
          echo "$(pwd)/.pixi/envs/build-ants/bin" >> $GITHUB_PATH

      - name: Build ANTSPyNet
        shell: bash
        run: |
          rattler-build build \
            --continue-on-failure \
            --skip-existing local \
            --recipe ./recipes/antspynet/  \
            --build-num ${{ env.BUILD_NUM }} \
            ${{ matrix.build-args }}  \
            --package-format conda:22

      - name: Upload package
        shell: bash
        # do not upload on PR
        if: github.event_name == 'push'
        run: |
          for pkg in output/**/*.conda; do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c noel-forge "${pkg}" --skip-existing || true
          done
