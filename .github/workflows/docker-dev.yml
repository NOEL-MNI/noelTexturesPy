name: Dev Docker Image

on:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push Dev Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            noelmni/textures-py
            noelmni/pynoel-gui-app
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-
          labels: |
            org.opencontainers.image.title="noelTexturesPy"
            org.opencontainers.image.description="Dash app to generate texture maps from MRI using Advanced Normalization Tools"
            org.opencontainers.image.vendor="Neuroimaging of Epilepsy Laboratory at McGill University"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SKIP_TESTS=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
