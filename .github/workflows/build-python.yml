name: Test with Pixi

on:
  push:
    branches:
      - main
      - dev
      - tests/**
      - pixi-dev
  pull_request:

env:
  FORCE_COLOR: 1

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: latest
          cache: true

      - name: Set Python version
        run: |
          pixi project platform add linux-64
          pixi add python=${{ matrix.python-version }}

      - name: Install dependencies
        run: pixi install

      - name: Run all tests
        run: pixi run test
