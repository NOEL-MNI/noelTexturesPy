[workspace]
authors = ["Ravnoor Gill <ravnoor.gill@mcgill.ca>"]
channels = ["conda-forge"]
description = "Plotly Dash app to generate textures maps from MRI"
name = "noelTexturesPy"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
version = "0.2.2"

[tasks]
app = { cmd = "python3 src/noelTexturesPy/app.py" }
fmt = "ruff"
lint = "pylint"
test = { cmd = "python -m pytest tests/test_noelTexturesPy.py -v" }

[tasks.test-app]
depends-on = [
  { task = "test", environment = "dev" },
]

[dependencies]
numpy = ">=1.26.4,<2"
scipy = "<1.16"
pandas = ">=2.2.3,<3"
matplotlib = ">=3.9.2,<4"
pillow = ">=11.0.0,<12"
dash = ">=2.18.2,<3"
flask = ">=3.0.3,<4"
nibabel = ">=5.3.2,<6"
pyyaml = ">=6.0.2,<7"
webcolors = ">=1.12,<2"

[pypi-dependencies]
noel-textures-py = { path = ".", editable = true }
dash-bootstrap-components = ">=1.6.0,<2"
dash-html-components = ">=2.0.0,<3"
chart-studio = ">=1.1.0,<2"

[feature.ants]
channels = ["https://repo.prefix.dev/noel-forge"]
dependencies = { antspyx = ">=0.6.2", antspynet = ">=0.3.1" }

[feature.build-ants.dependencies]
rattler-build = ">=0.49.0,<1"

[feature.dev.pypi-dependencies]
datalad = "*"

[feature.dev.dependencies]
pre-commit = ">=4.2.0,<5"

[feature.test.pypi-dependencies]
pytest = ">=8.4.1, <9"
pyprojroot = ">=0.3.0, <0.4"

[environments]
build-ants = {features = ["build-ants"], no-default-feature = true}
dev = {features = ["ants", "dev", "test"]}
default = {features = ["ants", "test"]}
