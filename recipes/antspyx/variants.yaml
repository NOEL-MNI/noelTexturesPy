channel_sources:
  - conda-forge
c_stdlib:
  - if: linux
    then:
    - sysroot
  - if: osx
    then:
    - macosx_deployment_target
  - if: win
    then:
    - vs

c_stdlib_version:
  - if: linux and x86_64
    then: 2.17
  - if: linux and aarch64
    then: 2.38
  - if: osx and x86_64
    then: 10.13
  - if: osx and arm64
    then: 11.0

python:
# note that versions are _strings_ (not numbers)
- "3.12"
- "3.13"
- "3.14"
