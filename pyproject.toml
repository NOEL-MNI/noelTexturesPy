[build-system]
build-backend = "setuptools.build_meta"
requires = [ "setuptools>=75", "setuptools-scm[toml]>=8" ]

[project]
name = "noel-textures-py"
description = "Dash app to generate textures maps from MRI"
readme = "README.md"
keywords = [ "ANTsPy", "Dash", "MRI", "texture maps" ]
license = { file = "LICENSE" }
authors = [
  { name = "NOEL-MNI", email = "ravnoor.gill@mail.mcgill.ca" },
]
requires-python = ">=3.12"
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
dynamic = [ "version" ]

dependencies = [
  "dash",
  "dash-bootstrap-components",
  "dash-html-components",
  "flask",
  "matplotlib",
  "numpy",
  "pandas",
  "pillow",
]

urls.Documentation = "https://noel-mni.github.io/noelTexturesPy"
urls.Homepage = "https://github.com/NOEL-MNI/noelTexturesPy"
scripts.textures_app = "noelTexturesPy.app:main"

[dependency-groups]
dev = [
  "mypy",
  "pytest",
]
ants = [
  "antspynet>=0.2.9",
  "antspyx>=0.4.2",
]

[tool.setuptools]
include-package-data = false

[tool.setuptools.packages.find]
where = [ "src" ]
include = [ "noelTexturesPy*" ]
exclude = [ "web*", "docker*", "images*", "templates*", "docs*", "build*", ".pixi*", ".github*" ]

[tool.setuptools_scm]
write_to = "src/noelTexturesPy/_version.py"
fallback_version = "0.2.2"
version_scheme = "no-guess-dev"

[tool.ruff]
format.quote-style = "single"
lint.select = [
  "B",
  "E",
  "F",
  "I",
  "W",
]
lint.ignore = [
  "E203",
  "E501",
  "N813",
]
lint.isort.force-single-line = true
lint.preview = true

[tool.mypy]
pretty = true

[[tool.mypy.overrides]]
module = "dash_bootstrap_components.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "dash.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "ants.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "antspynet.*"
ignore_missing_imports = true
